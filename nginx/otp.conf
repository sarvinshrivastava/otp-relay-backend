# Reference vhost for the SHARED VPS Nginx (deploy "Option B").
#
# This file documents the routing the otp-relay needs. On the VPS, vps-deploy
# typically generates the actual vhost (assigning APP_PORT and wiring the wildcard
# cert); use this as the source of truth for what that vhost must contain.
#
# Replace APP_PORT with the host port vps-deploy assigned to the relay container
# (see /etc/vps-registry/ports.json). The relay listens on container port 8080,
# published to the host as APP_PORT by docker-compose.yml.

server {
    listen 443 ssl;
    server_name otp.vps.sarvinshrivastava.space;

    ssl_certificate     /etc/letsencrypt/live/sarvinshrivastava.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarvinshrivastava.space/privkey.pem;

    # Go relay — WebSocket (long-lived; the Upgrade headers are mandatory).
    location /ws {
        proxy_pass http://127.0.0.1:APP_PORT;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # keep idle WS connections alive for 1h
    }

    # Go relay — REST API + TOTP dashboard auth.
    location /api {
        proxy_pass http://127.0.0.1:APP_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static PWA / dashboard files, populated by the otp-pwa repo's CI.
    location / {
        root /var/www/otp-pwa;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name otp.vps.sarvinshrivastava.space;
    return 301 https://$host$request_uri;
}
