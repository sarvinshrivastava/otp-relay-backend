# otp-relay — deploy model "Option B": this repo ships ONLY the relay container.
# TLS termination, the /ws + /api proxy, and serving the otp-pwa static files are
# all handled by the SHARED VPS Nginx (vps-deploy auto-creates that vhost and
# assigns the host port APP_PORT). See nginx/otp.conf for the reference vhost.
#
# We deliberately do NOT run our own Nginx here — binding 80/443 would collide
# with the VPS's shared front-door Nginx.

services:
  relay:
    build: .
    container_name: ${SERVICE_NAME:-otp-relay}
    restart: unless-stopped
    # Host port (auto-assigned by vps-deploy) -> container's RELAY_PORT (8080).
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      # Pin the in-container listen port; host side is APP_PORT above.
      - RELAY_PORT=8080
      - DB_PATH=/data/relay.db
    volumes:
      # Persist the SQLite DB across container restarts/redeploys.
      - relay-db:/data

volumes:
  relay-db:
