name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch VPS credentials from secrets-manager
        run: |
          SM_BASE="https://secrets.vps.sarvinshrivastava.space/api/secrets"
          SM_TOKEN="${{ secrets.SM_READ_TOKEN }}"

          # Fetch a secret value: try the shared Root folder first, then fall
          # back to the per-app otp folder. Prints the value (newline-terminated)
          # on success; fails the step if found in neither.
          fetch_secret() {
            local key="$1" folder val
            for folder in Root otp; do
              val=$(curl -sf -H "X-API-Key: $SM_TOKEN" "$SM_BASE/$folder/$key" 2>/dev/null | jq -r '.value // empty' 2>/dev/null) || true
              if [ -n "$val" ]; then
                printf '%s\n' "$val"
                return 0
              fi
            done
            echo "::error::secret '$key' not found in Root or otp folder" >&2
            return 1
          }

          VPS_HOST=$(fetch_secret VPS_HOST)
          echo "VPS_HOST=$VPS_HOST" >> "$GITHUB_ENV"

          {
            echo "VPS_SSH_KEY<<SSHEOF"
            fetch_secret VPS_SSH_KEY
            echo "SSHEOF"
          } >> "$GITHUB_ENV"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: root
          key: ${{ env.VPS_SSH_KEY }}
          script: |
            REPO_NAME=$(basename "${{ github.repository }}")
            APP_DIR="/root/apps/$REPO_NAME"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "${{ github.server_url }}/${{ github.repository }}.git" "$APP_DIR"
            else
              git -C "$APP_DIR" pull origin main
            fi
            vps-deploy "$REPO_NAME" "$APP_DIR"
